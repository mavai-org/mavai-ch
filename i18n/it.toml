[topic_iso]
other = "ISO 42001"

[topic_iso_desc]
other = "Lo standard internazionale per i sistemi di gestione dell'IA. Cosa richiede in termini di misurazione delle prestazioni, monitoraggio e miglioramento continuo dei sistemi di IA."

[topic_testing]
other = "Test probabilistici"

[topic_testing_desc]
other = "Perché i test tradizionali superato/non superato non possono soddisfare le esigenze normative per l'IA. Un'introduzione agli approcci statistici che producono evidenze verificabili e riproducibili."

