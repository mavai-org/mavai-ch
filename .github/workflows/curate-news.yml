name: Curate News

on:
  schedule:
    # Daily at 06:00 UTC — tiers 1, 2
    - cron: '0 6 * * *'
    # Weekly Monday 07:00 UTC — tiers 1, 2, 3
    - cron: '0 7 * * 1'
    # Monthly 1st at 08:00 UTC — tiers 1, 2, 3, 4
    - cron: '0 8 1 * *'
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Comma-separated tier numbers (empty = all)'
        required: false
        default: ''
      dry_run:
        description: 'Skip LLM filter (for testing without burning tokens)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write
  # Note: issue management uses ORG_REPO_TOKEN (below), not GITHUB_TOKEN,
  # because the org restricts GITHUB_TOKEN to read-only. The issues: write
  # scope is therefore not requested here — ORG_REPO_TOKEN carries it.

concurrency:
  group: curate-news
  cancel-in-progress: false

env:
  STRUCTURAL_REPORT_MD: ${{ github.workspace }}/javai-ch/build/site/structural-check-report.md
  ISSUE_TITLE: "Newsroom — scraper structural check failed"
  ISSUE_LABEL: newsroom-scraper

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: javai-ch

      - uses: actions/checkout@v4
        with:
          repository: mavai-org/mavai-newsroom
          ref: main
          path: javai-newsroom
          token: ${{ secrets.ORG_REPO_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25-ea

      - uses: gradle/actions/setup-gradle@v4

      # Determine tiers based on schedule or manual input
      - name: Determine tiers
        id: tiers
        run: |
          if [ -n "${{ github.event.inputs.tiers }}" ]; then
            echo "tiers=${{ github.event.inputs.tiers }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 8 1 * *" ]; then
            echo "tiers=1,2,3,4" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 7 * * 1" ]; then
            echo "tiers=1,2,3" >> "$GITHUB_OUTPUT"
          else
            echo "tiers=1,2" >> "$GITHUB_OUTPUT"
          fi

      # continue-on-error lets subsequent steps run (issue management,
      # PR creation for sources that did succeed) when curate exits
      # non-zero — exit 2 signals a structural check failure but the
      # feed has still been written with whatever other sources produced.
      - name: Fetch and filter news
        id: curate
        working-directory: javai-ch
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TIERS="${{ steps.tiers.outputs.tiers }}"
          ARGS="curateNews"
          if [ -n "$TIERS" ]; then
            ARGS="$ARGS -Ptiers=$TIERS"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS -PdryRun"
          fi
          ./gradlew $ARGS

      # Issue/label management runs via ORG_REPO_TOKEN and is best-effort:
      # the scraper-health issue is a convenience, not the workflow's
      # deliverable. If the token lacks Issues:write (HTTP 403), log and
      # continue so curation and the feed PR still complete.
      - name: Ensure newsroom-scraper label exists
        if: always() && steps.curate.outcome != 'skipped'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        working-directory: javai-ch
        run: |
          gh label create "$ISSUE_LABEL" \
            --description "Automated reports from the newsroom curate workflow" \
            --color b60205 \
            --force

      - name: Look up existing scraper-failure issue
        id: existing_issue
        if: always() && steps.curate.outcome != 'skipped'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        working-directory: javai-ch
        run: |
          number=$(gh issue list \
            --label "$ISSUE_LABEL" \
            --state open \
            --json number \
            --jq '.[0].number // ""')
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Create or update structural-failure issue
        if: steps.curate.outcome == 'failure' && hashFiles(env.STRUCTURAL_REPORT_MD) != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
          NUMBER: ${{ steps.existing_issue.outputs.number }}
        working-directory: javai-ch
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "$NUMBER" ]; then
            gh issue edit "$NUMBER" --body-file "$STRUCTURAL_REPORT_MD"
            gh issue comment "$NUMBER" \
              --body "Still failing — see [run #${{ github.run_id }}]($RUN_URL)."
          else
            gh issue create \
              --title "$ISSUE_TITLE" \
              --label "$ISSUE_LABEL" \
              --body-file "$STRUCTURAL_REPORT_MD"
          fi

      - name: Close resolved scraper-failure issue
        if: steps.curate.outcome == 'success' && steps.existing_issue.outputs.number != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
          NUMBER: ${{ steps.existing_issue.outputs.number }}
        working-directory: javai-ch
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment "$NUMBER" \
            --body "Structural checks now pass — closing. See [run #${{ github.run_id }}]($RUN_URL)."
          gh issue close "$NUMBER"

      - name: Check for changes
        id: changes
        working-directory: javai-ch
        run: |
          if git diff --quiet newsroom/data/feed.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new candidates found."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New candidates found in feed.yml."
          fi

      - name: Create or update PR
        if: steps.changes.outputs.changed == 'true'
        working-directory: javai-ch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="newsroom/curate"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add newsroom/data/feed.yml
          git commit -m "Add new feed candidates [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push --force origin "$BRANCH"

          # Create PR if one doesn't already exist
          if gh pr view "$BRANCH" --json state -q '.state' 2>/dev/null | grep -q OPEN; then
            echo "PR already open — updated with force push."
          else
            BODY="New feed candidates from the automated pipeline."
            BODY="$BODY"$'\n\n'"## Curator instructions"
            BODY="$BODY"$'\n\n'"1. Review items under \`# -- New candidates --\` in \`newsroom/data/feed.yml\`"
            BODY="$BODY"$'\n'"2. Change \`accepted: n\` to \`accepted: y\` for items to publish"
            BODY="$BODY"$'\n'"3. Optionally adjust \`tags\` or set \`featured: y\`"
            BODY="$BODY"$'\n'"4. Merge this PR to deploy"
            BODY="$BODY"$'\n\n'"Items left as \`accepted: n\` will remain in the file to prevent re-proposal."
            gh pr create --base main --head "$BRANCH" \
              --title "Feed candidates for review" \
              --body "$BODY"
          fi
