name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: javai-ch

      - uses: actions/checkout@v4
        with:
          repository: mavai-org/mavai-newsroom
          ref: main
          path: javai-newsroom
          token: ${{ secrets.ORG_REPO_TOKEN }}

      # Hugo site
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - run: hugo --minify
        working-directory: javai-ch

      # Java build + feed generation
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25-ea
      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew build
        working-directory: javai-ch

      - name: Generate all feeds
        working-directory: javai-ch
        run: ./gradlew generateAllFeeds

      # Merge feeds into Hugo output
      - name: Merge feeds into public
        run: cp -r javai-ch/build/site/* javai-ch/public/

      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: javai-ch/public

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
