baseURL = 'https://mavai.ch/'
title = 'Mavai Schweiz'
enableRobotsTXT = true
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

[params]
  author = "Mavai"
  ogImage = "images/hero.jpg"
  # Search engine ownership verification. Paste mavai.ch's OWN tokens — do not
  # reuse mavai.org's. Google Search Console (Settings → Ownership verification
  # → HTML tag) and Bing Webmaster Tools give a content value; paste that value
  # only, not the full meta tag. Empty = no tag emitted.
  # Note: mavai.ch is a separate Search Console property with its own DNS TXT
  # record. The DNS/Domain method is preferred — the full
  # `google-site-verification=…` token as a TXT record at the apex (a truncated
  # or fragment value will not verify).
  googleSiteVerification = ""
  bingSiteVerification = ""
  # Profiles linked from the Organization JSON-LD `sameAs`. Cross-links mavai.org
  # so search engines treat the two sites as one entity.
  sameAs = [
    "https://github.com/mavai-org",
    "https://mavai.org",
    "https://www.linkedin.com/in/mike-franz-mannion/",
  ]
  keywords = [
    "AI regulation Switzerland",
    "FINMA AI",
    "ISO 42001",
    "probabilistic testing",
    "AI compliance",
    "AI governance Switzerland",
    "AI risk management",
    "non-deterministic testing",
    "Swiss AI regulation",
    "KI Regulierung Schweiz",
    "réglementation IA Suisse"
  ]

ignoreFiles = ['^drafts/']

[markup.goldmark.renderer]
  unsafe = true

[params.analytics]
  # Full URL of the site-specific Plausible script. Empty string disables
  # analytics. The URL embeds the site ID (public; visible in page source).
  # Different per site: mavai.org and mavai.ch each have their own script URL.
  plausibleScriptUrl = "https://plausible.io/js/pa-Tbyp2qTnw4Ap6G3NO0KQ4.js"

# ── Languages ──

[languages.en]
  languageCode = 'en'
  languageName = 'English'
  contentDir = 'content/en'
  weight = 1

  [languages.en.params]
    description = "AI regulation in Switzerland — what's changing, what it means, and what to do about it."
    tagline = "Regulation. Compliance. Confidence."

  [[languages.en.menus.main]]
    name = 'Regulation News'
    pageRef = '/regulations'
    weight = 10
  [[languages.en.menus.main]]
    name = 'Insights'
